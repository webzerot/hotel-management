<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αποθήκη Πρωινού</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
        }
        header {
            background-color: #2b6cb0;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .live-badge {
            background-color: #48bb78;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .card h2 {
            margin-top: 0;
            color: #2d3748;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #38a169;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2f855a;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #edf2f7;
            color: #4a5568;
        }
        .loading {
            text-align: center;
            color: #718096;
            padding: 20px;
            font-style: italic;
        }
        .alert {
            background-color: #fed7d7;
            color: #9b2c2c;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Αποθήκη Πρωινού</h1>
        <div class="live-badge">Live Έλεγχος</div>
    </header>

    <div class="container">
        <!-- ΦΟΡΜΑ ΠΡΟΣΘΗΚΗΣ -->
        <div class="card">
            <h2>Προσθήκη Νέου Είδους</h2>
            <form id="productForm">
                <div class="form-grid">
                    <input type="text" id="name" placeholder="Όνομα (π.χ. Ψωμί)" required>
                    <input type="number" id="stock" placeholder="Απόθεμα" required min="0">
                    <input type="number" id="min_required" placeholder="Όριο Παραγγελίας" required min="0">
                    <input type="text" id="supplier" placeholder="Προμηθευτής (π.χ. ΜΑΥΡΟΣ)" required>
                </div>
                <button type="submit">Προσθήκη Προϊόντος +</button>
            </form>
        </div>

        <!-- ΠΙΝΑΚΑΣ ΑΠΟΘΗΚΗΣ -->
        <div class="card">
            <h2>Αποθήκη</h2>
            <div id="loading" class="loading">Φόρτωση αποθήκης...</div>
            <table id="productsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Προϊόν</th>
                        <th>Διαθέσιμο Απόθεμα</th>
                        <th>Όριο Ασφαλείας</th>
                        <th>Προμηθευτής</th>
                        <th>Κατάσταση</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                    <!-- Εδώ θα μπουν τα δεδομένα δυναμικά -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://hotel-management-vk0r.onrender.com/api/products';

        // Συναρτήση για τη λήψη των προϊόντων από το back-end
        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Σφάλμα κατά τη λήψη δεδομένων');
                
                const products = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('productsTable').style.display = 'table';
                
                const tbody = document.getElementById('productsBody');
                tbody.innerHTML = '';

                products.forEach(p => {
                    const needsOrder = p.stock <= p.min_required;
                    const statusCell = needsOrder ? '<span class="alert">Χαμηλό Απόθεμα</span>' : '<span style="color:#2f855a; font-weight:bold;">OK</span>';
                    
                    const row = `
                        <tr>
                            <td><strong>${p.name}</strong></td>
                            <td>${p.stock}</td>
                            <td>${p.min_required}</td>
                            <td>${p.supplier}</td>
                            <td>${statusCell}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = 'Αδυναμία σύνδεσης με τη βάση δεδομένων.';
            }
        }

        // Υποβολή της φόρμας για νέο προϊόν
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newProduct = {
                name: document.getElementById('name').value,
                stock: parseInt(document.getElementById('stock').value),
                min_required: parseInt(document.getElementById('min_required').value),
                supplier: document.getElementById('supplier').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });

                if (response.ok) {
                    document.getElementById('productForm').reset();
                    fetchProducts(); // Ανανέωση του πίνακα
                } else {
                    alert('Σφάλμα κατά την αποθήκευση του προϊόντος.');
                }
            } catch (err) {
                console.error(err);
                alert('Αδυναμία επικοινωνίας με τον server.');
            }
        });

        // Φόρτωση των προϊόντων κατά το άνοιγμα της σελίδας
        fetchProducts();
    </script>
</body>
</html>
